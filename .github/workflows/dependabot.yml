version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    labels:
      - "dependencias"
      - "seguridad"
    reviewers:
      - "USUARIO_GITHUB"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
